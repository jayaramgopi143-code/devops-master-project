name: Production DevOps Pipeline

on:
  push:
    branches:
      - main
      - master

jobs:
  build-scan-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }} # Built-in token used to push changes back to git

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # --- Generate the Short Commit SHA Tag ---
    - name: Set Short Git SHA
      id: vars
      run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

    - name: Build Docker Image
      run: |
        docker build -t devops-master-app:${{ steps.vars.outputs.sha_short }} ./app

    # --- DevSecOps Layer (Trivy Scan) ---
    - name: Install Trivy
      run: |
        sudo apt-get update
        sudo apt-get install wget apt-transport-https gnupg lsb-release -y
        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
        echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
        sudo apt-get update
        sudo apt-get install trivy -y

    - name: Run Trivy Scan
      run: |
        trivy image devops-master-app:${{ steps.vars.outputs.sha_short }}

    # --- Tag and Push using Git SHA ---
    - name: Tag and Push Docker Image to ECR
      run: |
        docker tag devops-master-app:${{ steps.vars.outputs.sha_short }} ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/devops-master-app:${{ steps.vars.outputs.sha_short }}
        docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/devops-master-app:${{ steps.vars.outputs.sha_short }}

    # --- GitOps Automation Layer (Update Helm) ---
    - name: Update Image Tag in Helm values.yaml
      run: |
        sed -i 's/tag: .*/tag: "${{ steps.vars.outputs.sha_short }}"/g' ./helm/devops-master-chart/values.yaml

    - name: Commit and Push Updated Helm values.yaml
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add ./helm/devops-master-chart/values.yaml
        git commit -m "chore: update image tag to ${{ steps.vars.outputs.sha_short }} [skip ci]"
        git push
